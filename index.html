<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnakeAndLadder</title>
    <link rel="stylesheet" href="CSS/reseter.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="container">
        <div class="board" id="board">
            <div class="startPosition" id="startPosition">start line
                <img id="player1" class="player1" src="assets/image/player1.png" alt="player1.png">
                <img id="player2" class="player2" src="assets/image/player2.png" alt="player2.png">
            </div>
            <div class="uiControl">
                <h2 id="turnInfo"></h2>
                <p id="dice">0</p>
                <button id="button">Roll</button>
            </div>
        </div>
        <div class="notifWrapper" id="notifWrapper">
            <div class="notification" id="notif">
                <p class="winMsg" id="winMsg"></p>
                <img id="playerImg" class="playerWin">
            </div>
            <div class="skillNotif" id="skill">
                <p class="skillMsg" id="skillMsg"></p>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
